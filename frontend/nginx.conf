server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the backend
    location /api/ {
        # Rewrite /api/foo -> /foo if your backend doesn't expect /api prefix
        # But usually, it's cleaner to keep it or strip it.
        # Here we assume backend handles paths as is, so we might need rewrite.
        # Let's assume we map /api -> / directly to keep it simple for now, 
        # BUT fastapi usually mounts on root.
        # IMPORTANT: If we change frontend to use /api, we must strip it or mount fastapi at /api.
        # Simpler approach: Proxy specific paths or just use the same ports if not using /api prefix.
        # actually, if we use VITE_API_URL='', then all requests are relative to root.
        
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    
    # Proxy Socket.IO
    location /socket.io/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}
