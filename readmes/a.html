        <script>
                var UA=navigator.userAgent;
                var navBar = document.getElementById('navBar');
                var svgContainer = document.getElementById('svg-container');
                var svg = svgContainer.querySelector('svg');
                var navThumbs = document.getElementById('nav-thumbs');
                var zoomBar = document.getElementById('zoomBar');
                var zoomLevel = 100;
                var originWidth = 1332.8346456692914;
                var originHeight = 1333;
                var isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(UA);
                
                function renavstyle() {
                    if(navBar.classList.contains('open')){
                        navBar.style.width = '200px';
                        navBar.style.height = '100%';
                        navBar.style.top = '0';
                        navThumbs.style.display = 'block';
                    }else{
                        navBar.style.width = 'auto';
                        navBar.style.height = 'auto';
                        navBar.style.top = 'auto';
                        navThumbs.style.display = 'none';
                    }
                }
                function resvgstyle() {
                    var w = window.innerWidth;
                    var h = window.innerHeight;
                    var sw = w - (navBar.classList.contains('open') ? 200 : 0);
                    var scale = zoomLevel / 100;
                    svg.style.width = originWidth * scale + 'px';
                    svg.style.height = originHeight * scale + 'px';
                }
                
                document.getElementById('navButton').onclick = function() {
                    navBar.classList.toggle('open');
                    var icons = this.querySelectorAll('.nav-icon-span');
                    icons[0].style.display = navBar.classList.contains('open') ? 'none' : 'block';
                    icons[1].style.display = navBar.classList.contains('open') ? 'block' : 'none';
                    renavstyle();
                    var sideWidth = navBar.offsetWidth;
                    document.getElementById('content').style.marginRight = sideWidth + 'px';
                    resvgstyle();
                }
                
                zoomBar.oninput = function() {
                    zoomLevel = this.value;
                    resvgstyle();
                }
                
                function recontainstyle() {
                    var w = window.innerWidth;
                    if (w < 768) {
                        document.getElementById('zoom').style.display = 'none';
                    } else {
                        document.getElementById('zoom').style.display = 'block';
                    }
                }
                window.onresize = function() {
                    recontainstyle();
                    resvgstyle();
                }
                
                function doscroll(){
                    var top = document.getElementById('content').scrollTop;
                    var items = document.querySelectorAll('.nav-thumb');
                    var h = originHeight * zoomLevel / 100;
                    var gap = 10;
                    var index = Math.floor(top / (h + gap));
                    if(!document.querySelector('.selected') || document.querySelector('.selected') != items[index]){
                        if(document.querySelector('.selected')){
                            document.querySelector('.selected').classList.remove('selected');
                        }
                        if(items[index]){
                            items[index].classList.add('selected');
                        }
                    }
                }
                document.getElementById('content').onscroll = doscroll;
                
                window.onkeydown = function(e){
                    if(e.ctrlKey && e.keyCode == 70){
                        e.preventDefault();
                        var search = prompt('Search text');
                        if(search){
                            window.find(search);
                        }
                    }
                }
                
                // select page
                function selectPage() {
                    var sub = location.hash;
                    if(sub && sub.indexOf('#page') == 0){
                        sub = sub.split('#page')[1];
                        var el = document.getElementById('page' + sub);
                        if(el){
                            el.scrollIntoView();
                            // update thumbnail
                            sub = parseInt(sub);
                            if(document.querySelector('#nav-thumbs .selected')){
                                document.querySelector('#nav-thumbs .selected').classList.remove('selected');
                            }
                            document.querySelector('.nav-thumb:nth-of-type('+sub+')').classList.add('selected');
                        }
                    }
                }
                window.onload = function() {
                    if(location.hash){
                        selectPage();
                    }
                    var items = document.querySelectorAll('.nav-thumb');
                    for(var i=0; i<items.length; i++){
                        items[i].onclick = function(){
                            var index = Array.prototype.indexOf.call(items, this) + 1;
                            location.hash = '#page' + index;
                            selectPage();
                        }
                    }
                    if(!document.getElementsByClassName('selected').length){
                        document.getElementsByClassName('nav-thumb')?.[0]?.classList.add('selected');
                    }
                }
                window.onhashchange = function() {
                    selectPage();
                }
                
                var navs=document.querySelectorAll('.nav-thumb');
                for(var i=0;i<navs.length;i++){
                    navs[i].children[0].children[1].onclick=function () {
                        document.querySelector('#nav-thumbs .selected').classList.remove('selected');
                        this.parentNode.classList.add('selected');
                    }
                }
                if(UA.indexOf('Mobile')>=0){
                    document.getElementById('navButton').click();
                }
                renavstyle();
                resvgstyle();
                doscroll();
                var sideWidth = navBar.offsetWidth;
                document.getElementById('content').style.marginRight = sideWidth + 'px';
                recontainstyle();
                
                </script>
