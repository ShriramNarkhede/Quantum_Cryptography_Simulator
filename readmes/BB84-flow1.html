                    document.getElementById('content').classList.toggle('svgls');
                };
                window.onresize = function () {
                    renavstyle();
                    resvgstyle();
                    maxcount=max();
                    zoom();
                };
                window.onscroll = renavstyle;
                function recontainstyle() {
                    var zoom=document.getElementById('zoomBar').value;
                    if(zoom!=1){
                        document.getElementById('svg').style.height=document.getElementById('svg-container').getBoundingClientRect().height+25+'px';
                    }
                    for (var i = 1; i < svgcount; i++) {
                        heightArr[i]=svgs.children[i].getBoundingClientRect().height+10;
                    }
                    var topHeight = conInfo?.clientHeight || 0;
                    if (document.getElementById('svg').clientHeight+document.getElementById('disclaimer').clientHeight+document.getElementById('ac-container').clientHeight+topHeight+43<=window.innerHeight) {
                        document.getElementById('content').style.height=window.innerHeight-topHeight-10+'px';
                    }else{
                        document.getElementById('content').style.height='auto';
                    }
                }
                function resvgstyle() {
                    var sideWidth = navBar.offsetWidth + 20;
                    var oriWidth = styleArr[i].width;
                    var oriHeight = styleArr[i].height;
                    var percent = oriHeight / oriWidth;
                    var innerWidth = document.body.offsetWidth - sideWidth;
                    if (innerWidth <= oriWidth) {
                        svgs.removeAttribute('width');
                        svgs.removeAttribute('height');
                        if (ua) {
                            svgs.setAttribute('height', innerWidth * percent);
                        }
                    } else {
                        svgs.setAttribute('width', oriWidth);
                        svgs.setAttribute('height', oriHeight);
                    }
                    recontainstyle();
                }
                function renavstyle() {
                    var topHeight = conInfo?.clientHeight || 0;
                    var scrollTop = document.body.scrollTop || document.documentElement.scrollTop;
                    if (scrollTop > topHeight) {
                        document.getElementById('navBar').style.top = 0 + 'px';
                    } else {
                        document.getElementById('navBar').style.top = topHeight - scrollTop + 'px';
                    }
                    doscroll();
                }
                function doscroll() {
                    var topHeight=conInfo?.clientHeight || 0;
                    var scrollTop=document.body.scrollTop||document.documentElement.scrollTop;
                    for(var i=1;i<svgcount;i++){
                        var sum=0;
                        for(var j=1;j<=i;j++){
                            sum+=heightArr[j];
                        }
                        if(scrollTop+window.innerHeight/2-topHeight-10-sum<0){
                            var sub=Number(i);
                            if(document.querySelector('#nav-thumbs .selected')){
                                document.querySelector('#nav-thumbs .selected').classList.remove('selected');
                            }
                            document.querySelector('.nav-thumb:nth-of-type('+sub+')').classList.add('selected');
                            break;
                        }
                    }
                    if(!document.getElementsByClassName('selected').length){
                        document.getElementsByClassName('nav-thumb')?.[0]?.classList.add('selected');
                    }
                }
                var navs=document.querySelectorAll('.nav-thumb');
                for(var i=0;i<navs.length;i++){
                    navs[i].children[0].children[1].onclick=function () {
                        document.querySelector('#nav-thumbs .selected').classList.remove('selected');
                        this.parentNode.classList.add('selected');
                    }
                }
                if(UA.indexOf('Mobile')>=0){
                    document.getElementById('navButton').click();
                }
                renavstyle();
                resvgstyle();
                doscroll();
                var sideWidth = navBar.offsetWidth;
                document.getElementById('content').style.marginRight = sideWidth + 'px';
                recontainstyle();
                
                </script>

            </body>
